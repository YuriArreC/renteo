# Supabase local configuration. Project_id is per-developer; secret values
# (anon/service keys, JWT secret) live outside this file.

project_id = "renteo"

[api]
enabled = true
port = 54321
schemas = ["public", "app", "core", "tax_params", "tax_data", "tax_calc", "security", "privacy", "tax_rules"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[edge_runtime]
enabled = false
